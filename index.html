<!DOCTYPE html>
<!-- 이 문서는 HTML5라는 최신 웹 언어로 작성되었다는 것을 브라우저에게 알려줍니다 -->
<html lang="ko">
<head>
<!-- 컴퓨터에게 이 문서를 해석하는 방식을 알려주는 보이지 않는 '설정' 영역입니다 -->
<meta charset="UTF-8"> <!-- 한글이 깨지지 않도록 하는 설정 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 스마트폰 화면 크기에 딱 맞게 웹페이지를 띄우라는 명령어 (반응형) -->
<meta name="theme-color" content="#0F6E56"> <!-- 모바일 브라우저 상단(주소창)의 테마 색상을 지정합니다 -->
<title>일본 단기선교 가이드북</title> <!-- 브라우저 탭에 표시되는 웹사이트의 이름입니다 -->

<!-- 분리해둔 style.css(디자인 파일)를 이 뼈대에 연결하라는 명령어입니다 -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 실제로 사용자 눈에 보이는 화면(버튼, 글씨 등)은 모두 body 태그 안에 들어갑니다 -->

<!-- 
  [페이지 시스템의 원리]
  .page 라는 클래스(별명)를 가진 <div> 상자들이 각각의 화면(페이지) 역할을 합니다.
  처음에는 모두 숨겨져 있다가, 'active(활성화)'라는 별명이 붙은 상자만 화면에 나타납니다.
-->

<!-- ============================================================ -->
<!-- 🏠 HOME (메인 화면) -->
<!-- ============================================================ -->
<div class="page active" id="home">
  <!-- header: 페이지 맨 위의 제목과 설명을 묶어주는 상자 -->
  <header class="app-header" style="position: relative;">
    <h1 id="tripTitle">일본 단기선교 가이드북</h1>
    <p class="subtitle" id="tripSubtitle">2026.08.04(화) ~ 08.12(수) · 8박 9일</p>
    <!-- 나중에 자바스크립트가 데이터를 다 불러오면 이 글씨를 '완료'로 바꿔줍니다 -->
    <p class="subtitle" id="loadStatus" style="margin-top:6px; font-size:11px;">📡 최신 정보를 불러오는 중...</p>
    
    <!-- a 태그는 링크를 걸어줍니다. target="_blank"는 새 창(새 탭)에서 열라는 뜻입니다 -->
    <a href="https://docs.google.com/spreadsheets/d/1e-fYMtnsH_Z8fdBgo5kqwZUlab_QvftwzfP87UHCWTc/edit" target="_blank" class="sheet-link-btn">📝 시트 수정</a>
  </header>

  <!-- 메인 메뉴 버튼들을 바둑판 모양으로 담아두는 큰 상자 -->
  <div class="menu-grid">
    <!-- onclick="goTo('아이디')": 이 버튼을 클릭하면 자바스크립트에게 '아이디' 페이지로 이동시켜달라고 명령합니다 -->
    <button class="menu-card" onclick="goTo('page-helpful')"><span class="icon">🗣️</span><span class="label">도움되는 것</span><span class="desc">자주 사용하는 말 등 참고 자료</span></button>
    <button class="menu-card" onclick="goTo('page-songs')"><span class="icon">🎵</span><span class="label">찬양 악보</span><span class="desc">일본어 · 한국어 찬양 리스트</span></button>
    <button class="menu-card" onclick="goTo('page-devotion')"><span class="icon">📖</span><span class="label">말씀 묵상</span><span class="desc">일자별 본문 및 묵상</span></button>
    <button class="menu-card" onclick="goTo('page-schedule')"><span class="icon">📅</span><span class="label">일정</span><span class="desc">전체 일정표 · 일자별 시간표</span></button>
    <button class="menu-card" onclick="goTo('page-prep')"><span class="icon">🎒</span><span class="label">필요 준비물</span><span class="desc">출발 전 · 일자별 준비물</span></button>
    <button class="menu-card" onclick="goTo('page-etc')"><span class="icon">📌</span><span class="label">기타 내용</span><span class="desc">공지 및 참고사항</span></button>
    <button class="menu-card changes" onclick="goTo('page-changes')"><span class="icon">🔔</span><span class="label">변경사항</span><span class="desc">현지 업데이트 확인</span></button>
    <button class="menu-card memo" onclick="goTo('page-memo')"><span class="icon">✍️</span><span class="label">개인 메모</span><span class="desc">나만의 메모장 (로컬 저장)</span></button>
  </div>

  <footer>일본 단기선교팀 가이드북</footer> <!-- 페이지 맨 밑 꼬리말 -->
</div>

<!-- ============================================================ -->
<!-- 0) 도움되는 것 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-helpful">
  <div class="page-header">
    <button class="back-btn" onclick="goHome()">← 홈으로</button> <!-- 뒤로가기 버튼 -->
    <h2 class="page-title">🗣️ 도움되는 것</h2>
  </div>
  <!-- 
    주의! 아래 <div> 상자들은 텅 비어있습니다.
    자바스크립트가 구글 시트에서 데이터를 가져온 뒤, 이 빈 상자(id)를 찾아내어 안에 내용을 자동으로 채워 넣습니다.
  -->
  <div class="sub-tabs" id="phraseTabs"></div>
  <div id="phraseContent"></div>
</div>

<!-- ============================================================ -->
<!-- 1) 찬양 악보 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-songs">
  <div class="page-header"><button class="back-btn" onclick="goHome()">← 홈으로</button><h2 class="page-title">🎵 찬양 악보 리스트</h2></div>
  <div class="sub-tabs" id="songTabs"></div><div id="songContent"></div>
</div>

<!-- ============================================================ -->
<!-- 2) 말씀 묵상 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-devotion">
  <div class="page-header"><button class="back-btn" onclick="goHome()">← 홈으로</button><h2 class="page-title">📖 말씀 묵상</h2></div>
  <div class="day-tabs" id="devotionDayTabs"></div><div id="devotionContent"></div>
</div>

<!-- ============================================================ -->
<!-- 3) 일정 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-schedule">
  <div class="page-header"><button class="back-btn" onclick="goHome()">← 홈으로</button><h2 class="page-title">📅 일정</h2></div>
  
  <!-- 페이지 안의 서브 메뉴 (전체표 / 일자별) -->
  <div class="sub-tabs">
    <button class="sub-tab active" data-target="sched-overview" onclick="switchScheduleView(this)">전체 일정표</button>
    <button class="sub-tab" data-target="sched-daily" onclick="switchScheduleView(this)">일자별 시간표</button>
  </div>
  
  <!-- 서브 메뉴 버튼을 누를 때마다 아래 sub-page 둘 중 하나만 active가 되어 보여집니다 -->
  <div class="sub-page active" id="sched-overview"><div id="overviewTableWrap"></div></div>
  <div class="sub-page" id="sched-daily">
    <!-- 개발자용 일정 시간 테스트 패널 -->
    <div class="schedule-time-control">
      <div class="schedule-time-control-title">🧪 강조 시간 테스트</div>
      <div class="schedule-time-control-help">날짜와 시간을 선택하면 그 시각을 기준으로 표시합니다. 입력값을 비우면 실시간으로 돌아갑니다.</div>
      <div class="schedule-time-control-row">
        <!-- type="datetime-local"은 달력과 시간 선택기 팝업을 띄워주는 HTML 기본 기능입니다 -->
        <input class="schedule-time-input" id="scheduleTestDateTime" type="datetime-local" onchange="applyScheduleTestDateTime(this.value)">
        <button class="schedule-time-reset" type="button" onclick="clearScheduleTestDateTime()">실시간으로</button>
      </div>
      <div class="schedule-time-status" id="scheduleTimeStatus">현재 기기 시각을 기준으로 표시합니다.</div>
    </div>
    <div class="day-tabs" id="scheduleDayTabs"></div><div id="scheduleContent"></div>
  </div>
</div>

<!-- ============================================================ -->
<!-- 4) 필요 준비물 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-prep">
  <div class="page-header"><button class="back-btn" onclick="goHome()">← 홈으로</button><h2 class="page-title">🎒 필요 준비물</h2></div>
  <div class="sub-tabs">
    <button class="sub-tab active" data-target="prep-category" onclick="switchPrepView(this)">카테고리별</button>
    <button class="sub-tab" data-target="prep-daily" onclick="switchPrepView(this)">일자별</button>
  </div>
  <div class="sub-page active" id="prep-category"><div class="sub-tabs" id="prepCategoryTabs"></div><div id="prepCategoryContent"></div></div>
  <div class="sub-page" id="prep-daily"><div class="day-tabs" id="prepDayTabs"></div><div id="prepDailyContent"></div></div>
</div>

<!-- ============================================================ -->
<!-- 5) 기타 내용 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-etc">
  <div class="page-header"><button class="back-btn" onclick="goHome()">← 홈으로</button><h2 class="page-title">📌 기타 내용</h2></div>
  <div id="etcContent"></div>
</div>

<!-- ============================================================ -->
<!-- 6) 변경사항 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-changes">
  <div class="page-header"><button class="back-btn" onclick="goHome()">← 홈으로</button><h2 class="page-title">🔔 변경사항</h2></div>
  <div id="changesContent"></div>
</div>

<!-- ============================================================ -->
<!-- 7) 개인 메모 페이지 -->
<!-- ============================================================ -->
<div class="page" id="page-memo">
  <div class="page-header"><button class="back-btn" onclick="goHome()">← 홈으로</button><h2 class="page-title">✍️ 개인 메모</h2></div>
  
  <!-- 사용자가 글씨를 입력할 수 있는 구역 -->
  <div class="card memo-input-card">
    <p class="card-title" style="color: #0F6E56;">➕ 새 메모 작성</p>
    <!-- textarea는 여러 줄의 텍스트를 입력할 수 있는 텍스트 박스입니다 -->
    <textarea id="myMemoInput" placeholder="나만의 메모를 작성하세요. (내 기기에만 비공개로 저장됩니다)" class="devo-answer-input" style="min-height:80px; margin-bottom:8px;"></textarea>
    <!-- 이 버튼을 누르면 자바스크립트의 saveMyMemo() 함수가 실행되어 내용이 폰에 저장됩니다 -->
    <button class="devo-save-btn" onclick="saveMyMemo()">저장하기</button>
  </div>
  
  <!-- 저장된 메모들이 카드 형태로 쌓일 빈 상자 -->
  <div id="myMemoList"></div>
</div>

<!-- 
  가장 마지막에 자바스크립트 파일(app.js)을 불러옵니다.
  HTML 뼈대가 모두 그려진 다음에 스크립트가 실행되어야 에러가 안 나기 때문입니다.
-->
<script src="app.js"></script>
</body>
</html>
